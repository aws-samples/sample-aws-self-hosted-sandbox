# Claude Code 沙盒 Pod —— 跑在 Kata microVM 里(验 H3)
# 用法:envsubst < sandbox.yaml | kubectl apply -f -   (替换 ACCT/REGION)
# 或手动把 <ACCT>/<REGION> 替成实际值。
apiVersion: v1
kind: Pod
metadata:
  name: claude-sbx-1
  labels: { app: claude-sbx, sandboxId: "1" }
spec:
  runtimeClassName: kata-qemu       # ← 实测通过(H3/e2e 均用此)
  # 注:kata-clh(Cloud Hypervisor)在 kata-deploy 3.31 arm64 上默认未注册 containerd handler
  # (R2 实锤,见 POC-实测结果.md §四点五),改 kata-clh 需在 kata-deploy values 显式启用 clh shim
  nodeSelector: { sandbox: "true" }
  containers:
  - name: agent
    image: ACCT.dkr.ecr.REGION.amazonaws.com/claude-sbx:poc
    command: ["sleep", "infinity"]
    ports:
    - { containerPort: 8080 }
    env:
    # 生产:凭据不进沙盒,走 LiteLLM 代理(R8 凭据隔离)
    - { name: ANTHROPIC_BASE_URL, value: "http://litellm.litellm.svc.cluster.local:4000" }
    - { name: ANTHROPIC_MODEL,    value: "claude-opus-4-8" }
    # ANTHROPIC_AUTH_TOKEN 由控制面按租户注入 virtual key,此处占位
    # POC 快速验证可暂用节点凭据链:
    #   CLAUDE_CODE_USE_BEDROCK=1, AWS_REGION=us-east-1, ANTHROPIC_MODEL=us.anthropic.claude-opus-4-8
---
apiVersion: v1
kind: Service
metadata:
  name: sbx-1
spec:
  type: ClusterIP                   # 不是 LoadBalancer —— 外部暴露统一走共享 ingress
  selector: { sandboxId: "1" }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sbx-1-ing
spec:
  ingressClassName: nginx
  rules:
  - host: 8080-sbx1.sbx.example.com   # 端口-沙盒ID.域名(通配符子域名方案)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend: { service: { name: sbx-1, port: { number: 8080 } } }
